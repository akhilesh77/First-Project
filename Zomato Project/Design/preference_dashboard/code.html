<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(17, 19, 23, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .deep-glow {
            box-shadow: 0 0 40px rgba(255, 178, 183, 0.15);
        }
        .ai-orb {
            background: conic-gradient(from 0deg, #ffb2b7, #d1bcff, #3cddc7, #ffb2b7);
            filter: blur(30px);
            opacity: 0.2;
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 126, 139, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 126, 139, 0.7); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
    </style>

<!-- (Suppressed to prioritize the Discover CTA focus) -->
<script>
        function setBudget(btn) {
            // Reset all siblings
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
                b.classList.add('text-on-surface-variant', 'hover:bg-white/5');
            });
            // Set active
            btn.classList.remove('text-on-surface-variant', 'hover:bg-white/5');
            btn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
        }

        // Simple parallax effect for AI orbs
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.ai-orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            orbs[0].style.transform = `translate(${x * 50}px, ${y * 50}px) rotate(${x * 360}deg)`;
            orbs[1].style.transform = `translate(${-x * 50}px, ${-y * 50}px) rotate(${-x * 360}deg)`;
        });
    </script>
